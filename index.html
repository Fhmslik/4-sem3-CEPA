<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEPA 城市經貿大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #c3dafe 100%);
            overflow: hidden;
            height: 100vh;
        }

        .game-font {
            font-family: 'ZCOOL KuaiLe', 'Microsoft JhengHei', '微軟正黑體', cursive;
        }

        .item-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .drop-zone {
            border: 4px dashed #3b82f6;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone.active {
            background-color: rgba(59, 130, 246, 0.1);
            transform: scale(1.03);
            border-color: #2563eb;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .hidden-stage {
            display: none !important;
        }

        .ans-btn {
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
        }

        .badge-large {
            font-size: 20px !important;
            padding: 4px 8px !important;
            font-weight: bold;
        }

        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none !important;
        }

        .feedback-overlay.show {
            display: flex !important;
        }

        .feedback-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .feedback-box h3 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .feedback-box p {
            font-size: 18px;
            color: #555;
            margin-bottom: 25px;
        }

        .feedback-box button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feedback-box button:hover {
            transform: scale(1.05);
        }

        .correct-bg {
            background: #10b981;
            color: white;
        }

        .wrong-bg {
            background: #ef4444;
            color: white;
        }

        .next-btn {
            background: #3b82f6;
            color: white;
            margin-top: 15px;
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .animate-pulse-custom {
            animation: pulse-orange 2s infinite;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(50px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <!-- 狀態列 -->
    <div class="w-full max-w-2xl flex justify-between items-center bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-xl mb-6 z-20 border border-white/50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-xl text-xl">💡</div>
            <div>
                <h1 class="text-xl font-bold text-blue-900 game-font">CEPA 經貿特派員</h1>
                <p id="stage-title" class="text-xs text-blue-600 font-bold tracking-widest uppercase">第一關：零關稅挑戰</p>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[10px] font-black text-blue-400 uppercase mb-1">進度 Progress</div>
            <div class="w-40 h-3 bg-gray-200 rounded-full overflow-hidden border border-gray-100">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-700" style="width: 0%"></div>
            </div>
            <div id="score-display" class="text-2xl font-black text-blue-900 mt-1">0 <span class="text-sm text-blue-400">/ 1000</span></div>
        </div>
    </div>

    <!-- 第一關：貨物貿易 -->
    <div id="stage-1" class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8 items-center h-[65vh]">
        <div class="bg-white/40 backdrop-blur-sm p-6 rounded-[2rem] border-2 border-white shadow-inner flex flex-wrap justify-center gap-4 content-start overflow-y-auto max-h-full">
            <div id="item-container" class="flex flex-wrap justify-center gap-4">
                <!-- 25 個項目將由 JS 生成 -->
            </div>
        </div>

        <div id="drop-zone" class="drop-zone h-full rounded-[2rem] flex flex-col items-center justify-center p-8 relative overflow-hidden">
            <div id="portal-content" class="flex flex-col items-center">
                <div id="portal-icon" class="text-8xl mb-6 transition-all duration-500">🚢</div>
                <h2 id="portal-text" class="text-3xl font-bold text-blue-900 game-font mb-2 text-center">進入內地零關稅</h2>
                <p id="portal-subtext" class="text-center text-blue-700 font-medium max-w-xs">
                    請將標有 <span class="bg-red-500 text-white px-2 py-0.5 rounded-lg text-xs font-bold shadow-sm">Made in HK</span> 的產品拖進來！
                </p>
            </div>

            <button id="next-stage-btn" onclick="goToStage2()" class="hidden-stage bg-orange-500 text-white px-10 py-5 rounded-full font-bold text-2xl hover:bg-orange-600 transition-all animate-bounce shadow-2xl border-4 border-white animate-pulse-custom">
                進入第二關：專業服務挑戰 ➔
            </button>
        </div>
    </div>

    <!-- 第二關：專業服務挑戰 -->
    <div id="stage-2" class="hidden-stage w-full max-w-3xl bg-white/80 backdrop-blur-lg p-8 rounded-[3rem] shadow-2xl border-2 border-white relative">
        <div id="quiz-container">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div id="char-icon" class="text-5xl bg-white p-3 rounded-2xl shadow-md border border-blue-100">⚖️</div>
                    <div>
                        <h3 id="quiz-role" class="text-2xl font-bold text-blue-900">專業服務</h3>
                        <p class="text-blue-500 text-sm font-medium">關卡：CEPA 政策挑戰</p>
                    </div>
                </div>
                <div id="quiz-progress-text" class="text-blue-400 font-bold text-sm">問題 1 / 10</div>
            </div>
            
            <div class="bg-white p-8 rounded-3xl shadow-inner mb-8 min-h-[160px] flex items-center border border-blue-50">
                <p id="quiz-question" class="text-xl text-gray-800 font-bold leading-relaxed">載入中...</p>
            </div>
            
            <div id="quiz-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        
        <div id="game-over" class="hidden-stage text-center py-10">
            <div class="text-8xl mb-6">🎊</div>
            <h2 class="text-4xl font-bold text-blue-900 game-font mb-4">任務圓滿達成！</h2>
            <p class="text-blue-700 text-lg mb-10 font-medium">恭喜完成所有挑戰，你已成為合格的 CEPA 專家！</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold text-xl hover:scale-105 shadow-xl">重新挑戰</button>
        </div>
    </div>

    <!-- 第一關反饋彈窗 -->
    <div id="feedback-overlay" class="feedback-overlay">
        <div class="feedback-box">
            <h3 id="feedback-title">正確！</h3>
            <p id="feedback-message">這是香港生產的產品</p>
            <button class="next-btn" onclick="closeFeedback()">下一步</button>
        </div>
    </div>

    <script>
        const s1_items = [
            { id: 1, name: "中成藥", icon: "💊", isHK: true, desc: "正確！中成藥是香港傳統優勢，符合 CEPA 零關稅規則。" },
            { id: 2, name: "進口紅酒", icon: "🍷", isHK: false, desc: "不對喔！這只是海外轉運，未在港進行實質加工。" },
            { id: 3, name: "手工月餅", icon: "🥮", isHK: true, desc: "答對了！香港製造的食品享有零關稅。" },
            { id: 4, name: "精密零件", icon: "⚙️", isHK: true, desc: "賓果！香港本地組裝增值符合規則。" },
            { id: 5, name: "海外手機", icon: "📱", isHK: false, desc: "答錯了。非香港生產的電子產品無法享受優惠。" },
            { id: 6, name: "港製珠寶", icon: "💎", isHK: true, desc: "答對了！精緻的香港珠寶設計可免稅進入內地。" },
            { id: 7, name: "日本水果", icon: "🍓", isHK: false, desc: "錯了，雖然在香港出售，但產地並非香港。" },
            { id: 8, name: "本地XO醬", icon: "🍶", isHK: true, desc: "沒錯！本地品牌調味醬符合原產地標準。" },
            { id: 9, name: "法國香水", icon: "🧴", isHK: false, desc: "不對！這屬於海外轉口貿易貨物。" },
            { id: 10, name: "光纖組件", icon: "🔌", isHK: true, desc: "正確！高科技零部件在香港加工後可免稅。" },
            { id: 11, name: "進口奶粉", icon: "🍼", isHK: false, desc: "答錯。僅在香港轉運的進口產品不享優惠。" },
            { id: 12, name: "港產手錶", icon: "⌚", isHK: true, desc: "答對了！香港鐘錶業可受惠於 CEPA。" },
            { id: 13, name: "美國大豆", icon: "🫘", isHK: false, desc: "錯誤。產地來源並非香港。" },
            { id: 14, name: "印刷書刊", icon: "📚", isHK: true, desc: "正確！本地印刷裝訂的刊物享有零關稅。" },
            { id: 15, name: "瑞士巧克力", icon: "🍫", isHK: false, desc: "不對。並非香港本地生產。" },
            { id: 16, name: "微電子晶片", icon: "💾", isHK: true, desc: "正確！香港製造的晶片符合政策。" },
            { id: 17, name: "進口跑車", icon: "🏎️", isHK: false, desc: "答錯。這顯然不是香港製造。" },
            { id: 18, name: "本地蝦醬", icon: "🦐", isHK: true, desc: "對！大澳蝦醬等本地傳統食品享有優惠。" },
            { id: 19, name: "韓國化妝品", icon: "💄", isHK: false, desc: "錯誤。進口韓貨不具備零關稅資格。" },
            { id: 20, name: "實驗室設備", icon: "🧪", isHK: true, desc: "正確！在香港製造的設備可受惠。" },
            { id: 21, name: "海外球鞋", icon: "👟", isHK: false, desc: "不對。產地在海外無法享受優惠。" },
            { id: 22, name: "香港餅乾", icon: "🍪", isHK: true, desc: "答對了！本地烘焙食品一直是熱門出口。" },
            { id: 23, name: "進口家具", icon: "🪑", isHK: false, desc: "錯誤。這只是透過香港轉運。" },
            { id: 24, name: "精密模具", icon: "📐", isHK: true, desc: "正確！精密製造是香港的一環。" },
            { id: 25, name: "進口咖啡豆", icon: "☕", isHK: false, desc: "不對。咖啡豆並非在香港加工。" }
        ];

        let score = 0;
        let s1_correct = 0;
        let s1_target = s1_items.filter(i => i.isHK).length;
        let s2_index = 0;
        let pendingAction = null;

        function initS1() {
            const container = document.getElementById('item-container');
            container.innerHTML = '';
            s1_items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card bg-white p-5 rounded-3xl shadow-md border-b-4 border-gray-200 flex flex-col items-center w-36';
                card.draggable = true;
                card.id = `item-${item.id}`;
                card.innerHTML = `
                    <div class="text-5xl mb-3">${item.icon}</div>
                    <span class="text-base font-bold text-gray-800">${item.name}</span>
                    <div class="badge-large ${item.isHK ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-500'} rounded-full">
                        ${item.isHK ? '香港生產' : '外國生產'}
                    </div>
                `;
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('application/json', JSON.stringify(item));
                    setTimeout(() => card.classList.add('opacity-0'), 0);
                });
                card.addEventListener('dragend', () => card.classList.remove('opacity-0'));
                container.appendChild(card);
            });
        }

        function showFeedback(isCorrect, message) {
            const overlay = document.getElementById('feedback-overlay');
            const title = document.getElementById('feedback-title');
            const msgBox = document.getElementById('feedback-message');
            const box = overlay.querySelector('.feedback-box');
            
            title.innerText = isCorrect ? '✓ 正確！' : '✗ 錯誤';
            msgBox.innerText = message;
            
            if (isCorrect) {
                title.style.color = '#10b981';
                box.style.borderTop = '5px solid #10b981';
            } else {
                title.style.color = '#ef4444';
                box.style.borderTop = '5px solid #ef4444';
            }
            
            overlay.classList.add('show');
        }

        function closeFeedback() {
            const overlay = document.getElementById('feedback-overlay');
            overlay.classList.remove('show');
            
            if (pendingAction) {
                pendingAction();
                pendingAction = null;
            }
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const data = JSON.parse(e.dataTransfer.getData('application/json'));
            
            if(data.isHK) {
                score += 30; 
                s1_correct++;
                showFeedback(true, data.desc);
                document.getElementById(`item-${data.id}`).remove();
                
                pendingAction = () => {
                    updateUI();
                    if(s1_correct === s1_target) completeS1();
                };
            } else {
                showFeedback(false, data.desc);
                const card = document.getElementById(`item-${data.id}`);
                card.classList.add('animate-shake');
                setTimeout(() => card.classList.remove('animate-shake'), 500);
            }
        });

        function completeS1() {
            document.getElementById('portal-content').classList.add('hidden-stage');
            document.getElementById('next-stage-btn').classList.remove('hidden-stage');
        }

        function goToStage2() {
            document.getElementById('stage-1').classList.add('hidden-stage');
            document.getElementById('stage-2').classList.remove('hidden-stage');
            document.getElementById('stage-title').innerText = "第二關：專業服務挑戰";
            loadQuiz();
        }

        const s2_questions = [
            {
                q: "香港律師如何透過 CEPA 在內地執業？",
                icon: "👨‍⚖️",
                options: [
                    { text: "通過國家法律考試", correct: true, info: "考取內地資格是正規途徑。" },
                    { text: "憑港執照直接換領", correct: false, info: "兩地法律體系不同，仍需考試。" }
                ]
            },
            {
                q: "香港牙醫在內地開設診所的限制？",
                icon: "🩺",
                options: [
                    { text: "可設立獨資診所", correct: true, info: "CEPA 允許獨資經營。" },
                    { text: "必須與內地合資", correct: false, info: "目前已放寬至獨資。" }
                ]
            },
            {
                q: "CEPA 如何協助建築公司參與工程？",
                icon: "🏗️",
                options: [
                    { text: "香港經驗視同內地", correct: true, info: "互認機制讓香港實績可用於投標。" },
                    { text: "免除技術安全審查", correct: false, info: "安全法規必須嚴格遵守。" }
                ]
            },
            {
                q: "港產合拍片在內地上映的待遇？",
                icon: "🎬",
                options: [
                    { text: "視同內地國產電影", correct: true, info: "合拍片不受進口配額限制。" },
                    { text: "受進口配額限制", correct: false, info: "CEPA 致力消除此障礙。" }
                ]
            },
            {
                q: "CEPA 對跨境會計師提供的便利？",
                icon: "📊",
                options: [
                    { text: "延長臨時許可效期", correct: true, info: "減少行政手續負擔。" },
                    { text: "通用香港會計準則", correct: false, info: "需符合內地準則。" }
                ]
            }
        ];

        function loadQuiz() {
            if(s2_index >= s2_questions.length) {
                document.getElementById('quiz-container').classList.add('hidden-stage');
                document.getElementById('game-over').classList.remove('hidden-stage');
                return;
            }
            const q = s2_questions[s2_index];
            document.getElementById('quiz-progress-text').innerText = `問題 ${s2_index + 1} / ${s2_questions.length}`;
            document.getElementById('char-icon').innerText = q.icon;
            document.getElementById('quiz-question').innerText = q.q;
            const optionsBox = document.getElementById('quiz-options');
            optionsBox.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn bg-white hover:bg-blue-50 text-blue-900 p-6 rounded-3xl font-bold text-lg shadow-md border-2 border-blue-100 transition-all text-left';
                btn.innerHTML = `<span class="inline-block bg-blue-100 text-blue-600 w-8 h-8 rounded-full text-center leading-8 mr-3 font-bold">${idx + 1}</span> ${opt.text}`;
                btn.onclick = () => {
                    if(opt.correct) { score += 100; }
                    s2_index++;
                    updateUI();
                    setTimeout(loadQuiz, 2000);
                };
                optionsBox.appendChild(btn);
            });
        }

        function updateUI() {
            document.getElementById('score-display').innerHTML = `${score} <span class="text-sm text-blue-400">/ 1000</span>`;
            const progress = (s1_correct + s2_index) / (s1_target + s2_questions.length);
            document.getElementById('progress-bar').style.width = `${progress * 100}%`;
        }

        window.onload = initS1;
    </script>
</body>
</html>
